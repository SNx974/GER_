services:
  postgres:
    image: postgres:16-alpine
    container_name: ger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ger
      POSTGRES_PASSWORD: ger_password
      POSTGRES_DB: ger_esport
    ports:
      - "5432:5432"
    volumes:
      - ger_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ger -d ger_esport"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  ger_pgdata:
